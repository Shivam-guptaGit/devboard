<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevBoard</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #6a0dad, #b57edc);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      margin-top: 40px;
      font-size: 2rem;
      font-weight: 600;
    }
    .board {
      display: flex;
      gap: 20px;
      margin-top: 40px;
    }
    .column {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 15px;
      width: 200px;
    }
    .column h3 {
      margin-top: 0;
      font-size: 1.2rem;
    }
    .task {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      padding: 10px;
      margin: 10px 0;
    }
    footer {
      margin-top: auto;
      padding: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <header>DevBoard</header>
  <div class="board">
    <div class="column">
      <h3>To Do</h3>
      <div class="task">Fix login bug</div>
      <div class="task">Update docs</div>
    </div>
    <div class="column">
      <h3>In Progress</h3>
      <div class="task">Develop new API</div>
    </div>
    <div class="column">
      <h3>Done</h3>
      <div class="task">UI redesign</div>
    </div>
  </div>
  <footer>© 2026 DevBoard</footer>
</body>
</html>
